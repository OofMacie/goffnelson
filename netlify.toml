[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Allow Storyblok Visual Editor to embed the site in an iframe
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "frame-ancestors 'self' https://app.storyblok.com"

# Proxy CEFLS catalog to avoid CORS — must come before the catch-all redirect
[[redirects]]
  from = "/proxy/catalog/*"
  to = "https://cefls.ent.sirsi.net/client/en_US/default/:splat"
  status = 200
  force = true

# Redirect all routes to index (Astro handles routing)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
